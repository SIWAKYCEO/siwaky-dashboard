# Easypanel / production-oriented stack — no pinned container names or host ports
# so the panel proxy (Traefik) can route without clashes. Frontend reaches the API
# from the browser via NEXT_PUBLIC_*; server-side route handlers call backend at http://backend:8000 .

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8000"
      # Optional passthrough — set secrets in Easypanel as needed for your deploy.
      ENVIRONMENT: ${ENVIRONMENT:-production}
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      TIKTOK_PIXEL_ID: ${TIKTOK_PIXEL_ID:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      SNAP_PIXEL_ID: ${SNAP_PIXEL_ID:-}
      SNAP_ACCESS_TOKEN: ${SNAP_ACCESS_TOKEN:-}
      SHEETS_WEBHOOK_URL: ${SHEETS_WEBHOOK_URL:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Browser → public API origin (Easypanel / Traefik ingress); set in Easypanel.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Next route handlers (/api/dashboard/*) → backend on default compose network.
      DASHBOARD_ORDERS_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-1898036304185332}
      NEXT_PUBLIC_TIKTOK_PIXEL_ID: ${NEXT_PUBLIC_TIKTOK_PIXEL_ID:-D722UD3C77UDBCCMEAQG}
      NEXT_PUBLIC_SNAP_PIXEL_ID: ${NEXT_PUBLIC_SNAP_PIXEL_ID:-}
