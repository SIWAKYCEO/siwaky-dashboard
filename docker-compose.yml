# siwaky-dashboard compose
#
# Frontend (Next.js) listens internally on PORT **3001** (`dashboard-frontend` publishes **3001:3001** below).
#
# **`DASHBOARD_AUTH_SECRET` / `DASHBOARD_ADMIN_*`:** fallback values are baked into the image from
# `dockerfile`; do **not** set them here to blank strings (`${VAR}` with Easypanel unset) or Compose will
# override the image `ENV`.
#
# Service name **`dashboard-frontend`** matches Easypanel merge / routing. **`docker-compose.override.yml`**
# can carry extra panel overlays; duplicate port binds are omitted there so merges stay valid.
# Dashboard login: see **`frontend/.env.example`**.
# Orphan cleanup: Easypanel reads x-docker-compose-flags.remove_orphans; manual runs can use
# `./scripts/docker-compose-up.sh` (passes --remove-orphans on the CLI).

x-docker-compose-flags:
  remove_orphans: true

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Same PostgreSQL as siwaky.com orders (`orders` table). Override in Easypanel if credentials/host differ.
    environment:
      PORT: "8000"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      # Default: Easypanel Postgres service hostname on the internal Docker network.
      DATABASE_URL: ${DATABASE_URL:-postgres://siwaky:siwaky@siwaky_database:5432/siwaky?sslmode=disable}
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      TIKTOK_PIXEL_ID: ${TIKTOK_PIXEL_ID:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      SNAP_PIXEL_ID: ${SNAP_PIXEL_ID:-}
      SNAP_ACCESS_TOKEN: ${SNAP_ACCESS_TOKEN:-}
      SHEETS_WEBHOOK_URL: ${SHEETS_WEBHOOK_URL:-}
      # Browser → API: allow your Easypanel HTTPS origin (comma-separated). Example:
      # https://frontend-siwaky-dashboard.fcadiw.easypanel.host,https://siwaky.com
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}

  dashboard-frontend:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.siwaky.com}
      DASHBOARD_ORDERS_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://siwaky.com}
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-1898036304185332}
      NEXT_PUBLIC_TIKTOK_PIXEL_ID: ${NEXT_PUBLIC_TIKTOK_PIXEL_ID:-D722UD3C77UDBCCMEAQG}
      NEXT_PUBLIC_SNAP_PIXEL_ID: ${NEXT_PUBLIC_SNAP_PIXEL_ID:-}
