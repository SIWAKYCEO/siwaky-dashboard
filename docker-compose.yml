# Easypanel: set the compose project directory to the repo root (this file must sit next to
# the `backend/` and `frontend/` folders so build contexts resolve).
#
# Internal API for Next route handlers; browser uses NEXT_PUBLIC_API_URL (set in Easypanel).
# ---

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8000"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      TIKTOK_PIXEL_ID: ${TIKTOK_PIXEL_ID:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      SNAP_PIXEL_ID: ${SNAP_PIXEL_ID:-}
      SNAP_ACCESS_TOKEN: ${SNAP_ACCESS_TOKEN:-}
      SHEETS_WEBHOOK_URL: ${SHEETS_WEBHOOK_URL:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      DASHBOARD_ORDERS_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-1898036304185332}
      NEXT_PUBLIC_TIKTOK_PIXEL_ID: ${NEXT_PUBLIC_TIKTOK_PIXEL_ID:-D722UD3C77UDBCCMEAQG}
      NEXT_PUBLIC_SNAP_PIXEL_ID: ${NEXT_PUBLIC_SNAP_PIXEL_ID:-}
